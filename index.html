<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaxNation Jobs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/aws-intercept.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen text-[#0b0b0b] bg-[#fafafa] bg-[linear-gradient(to_right,#80808020_1px,transparent_1px),linear-gradient(to_bottom,#80808020_1px,transparent_1px)] bg-[size:32px_32px] selection:bg-[#5ce1e6] selection:text-black">
    
    <nav class="sticky top-0 z-50 border-b-2 border-black bg-white">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
            <a href="/" class="nav-link flex items-center gap-3 group cursor-pointer block">
                <span class="w-3 h-3 bg-[#ff2a2a] border-2 border-black"></span>
                <span class="font-black text-xl uppercase tracking-tighter text-black bg-[#5ce1e6] px-2 border-2 border-black shadow-[2px_2px_0_0_#0b0b0b] group-hover:translate-x-[1px] group-hover:translate-y-[1px] group-hover:shadow-[1px_1px_0_0_#0b0b0b] transition-all duration-75">
                    HAXNATION
                </span>
                <span class="hidden sm:inline font-mono text-[10px] font-bold uppercase tracking-widest text-black border-2 border-black px-1.5 py-0.5 bg-[#fafafa]">JOBS</span>
            </a>

            <div class="hidden md:flex items-center gap-6 font-mono text-sm font-bold uppercase">
                <a href="/jobs" class="nav-link text-black hover:border-b-4 hover:border-black pb-1 transition-colors block">Browse Jobs</a>
                <a href="/dashboard" class="nav-link text-black hover:border-b-4 hover:border-black pb-1 transition-colors block">Dashboard</a>
            </div>

            <div id="auth-section" class="flex items-center gap-3">
                <button id="login-btn" class="hidden font-mono uppercase tracking-widest font-bold bg-[#ff2a2a] text-white border-2 border-black px-6 py-2 shadow-[4px_4px_0_0_#0b0b0b] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0_0_#0b0b0b] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all duration-75">
                    Login
                </button>

                <div id="user-info" class="hidden flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white border-2 border-black px-3 py-1 shadow-[2px_2px_0_0_#0b0b0b]">
                        <div class="w-6 h-6 bg-[#5ce1e6] border-2 border-black flex items-center justify-center">
                            <span class="font-mono text-[10px] font-bold text-black" id="user-avatar-initials">U</span>
                        </div>
                        <span id="user-name" class="hidden sm:inline font-mono text-xs font-bold text-black uppercase"></span>
                    </div>
                    <button id="logout-btn" class="font-mono text-xs font-bold uppercase tracking-widest bg-white text-black border-2 border-black px-3 py-2 hover:bg-black hover:text-white transition-colors duration-0">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="app" class="w-full min-h-[calc(100vh-64px)] p-6 max-w-6xl mx-auto">
        <div class="flex items-center justify-center min-h-[50vh]">
            <div class="w-12 h-12 bg-black border-4 border-[#5ce1e6] shadow-[4px_4px_0_0_#5ce1e6] animate-[spin_1s_steps(4)_infinite]"></div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
